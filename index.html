<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RETRO SKATE - JOKO EDITION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="score">Score: 0</div>
        
        <div id="player">
            <div class="head">
                <div class="eye"></div>
            </div>
            <div class="body"></div>
            <div class="board">
                <div class="wheel" style="left: 5px;"></div>
                <div class="wheel" style="right: 5px;"></div>
            </div>
        </div>

        <div id="obstacle">
            <div class="bin-lid"></div>
        </div>

        <div id="ground"></div>
        
        <div id="msg">TAP / SPACE TO JUMP</div>

        <div id="game-over">
            <h1>WASTED</h1>
            <p>Score: <span id="final-score">0</span></p>
            <button onclick="resetGame()">RETRY</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
